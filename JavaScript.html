  function syncInventoryColumnSettings_(){
    const stored = uiSettings?.inventoryColumns;
    inventoryColumnSettings = (stored && typeof stored === 'object') ? stored : {};
  }
  function getSectionColumnState_(sectionLabel){
    const key = norm_(sectionLabel || '');
    const altKey = makeSectionKeyClient_(sectionLabel || '');
    const entry = inventoryColumnSettings[key] || inventoryColumnSettings[altKey] || {};
    return {
      g: entry.g !== false,
      h: entry.h !== false,
      j: entry.j !== false
    };
  }
  function isSectionColumnEnabled_(sectionLabel, field){
    const key = norm_(sectionLabel || '');
    const altKey = makeSectionKeyClient_(sectionLabel || '');
    const entry = inventoryColumnSettings[key] || inventoryColumnSettings[altKey] || {};
    return entry[field] !== false;
  }
  function applyInventoryColumnStateToDom_(){
    const rows = document.querySelectorAll('.itemRow[data-id]');
    const hide = !!uiSettings?.hideDisabledInputs;
    rows.forEach(row => {
      const sectionLabel = row.getAttribute('data-section-label') || '';
      const sectionKey = row.getAttribute('data-section-key') || '';
      const groupState = getGroupColumnStateBySectionKey_(sectionKey);
      row.querySelectorAll('[data-field]').forEach(inp => {
        const field = inp.getAttribute('data-field');
        if (!field) return;
        const baseAllow = inp.dataset.baseAllow === '1';
        const enabled = isSectionColumnEnabled_(sectionLabel, field);
        const groupEnabled = groupState[field] !== false;
        inp.disabled = layoutEditMode || !(baseAllow && enabled && groupEnabled);
      });
      const groupHide = getGroupHideDisabledBySectionKey_(sectionKey);
      const resolved = (groupHide !== null) ? groupHide : hide;
      refreshHiddenFieldCellsForRow_(row, resolved);
    });
    refreshHiddenSectionSubheadings_();
    if (editModalOpen) updateEditModalColumnState_();
  }
  function refreshHiddenFieldCells_(){
    const hide = !!uiSettings?.hideDisabledInputs;
    document.querySelectorAll('.itemRow[data-id]').forEach(row => {
      const sectionKey = row.getAttribute('data-section-key') || '';
      const groupHide = getGroupHideDisabledBySectionKey_(sectionKey);
      const resolved = (groupHide !== null) ? groupHide : hide;
      refreshHiddenFieldCellsForRow_(row, resolved);
    });
    refreshHiddenSectionSubheadings_();
  }
  function refreshHiddenFieldCellsForRow_(row, hideOverride){
    if (!row) return;
    const hide = (hideOverride !== undefined) ? hideOverride : !!uiSettings?.hideDisabledInputs;
    const sectionLabel = row.getAttribute('data-section-label') || '';
    const sectionKey = row.getAttribute('data-section-key') || '';
    const cfg = fieldCfgForSection_(sectionLabel || '');
    const groupState = getGroupColumnStateBySectionKey_(sectionKey);
    row.querySelectorAll('.cell[data-field-cell]').forEach(cell => {
      const field = cell.getAttribute('data-field-cell') ||
        cell.querySelector('[data-field]')?.getAttribute('data-field') || '';
      const index = field === 'g' ? 1 : field === 'h' ? 2 : field === 'j' ? 3 : null;
      if (!index) return;
      const sectionEnabled = isSectionColumnEnabled_(sectionLabel, field);
      const groupEnabled = groupState[field] !== false;
      const forceDisabled = !!cfg.forceDisable[index];
      const enabled = !forceDisabled && sectionEnabled && groupEnabled;
      cell.classList.toggle('fieldCellHidden', hide && !enabled);
    });
  }
  function refreshHiddenSectionSubheadings_(){
    const hideDefault = !!uiSettings?.hideDisabledInputs;
    document.querySelectorAll('.group[data-section-key]').forEach(header => {
      const sectionKey = header.getAttribute('data-section-key') || '';
      const sectionLabel = header.querySelector('.groupTitle div')?.textContent || '';
      const groupHide = getGroupHideDisabledBySectionKey_(sectionKey);
      const hide = (groupHide !== null) ? groupHide : hideDefault;
      const cfg = fieldCfgForSection_(sectionLabel || '');
      const groupState = getGroupColumnStateBySectionKey_(sectionKey);
      header.querySelectorAll('.groupSub.sectionSubGrid [data-field]').forEach(span => {
        const field = span.getAttribute('data-field');
        const index = field === 'g' ? 1 : field === 'h' ? 2 : field === 'j' ? 3 : null;
        if (!index) return;
        const sectionEnabled = isSectionColumnEnabled_(sectionLabel, field);
        const groupEnabled = groupState[field] !== false;
        const forceDisabled = !!cfg.forceDisable[index];
        const enabled = !forceDisabled && sectionEnabled && groupEnabled;
        span.classList.toggle('fieldCellHidden', hide && !enabled);
      });
    });
  }
  function updateEditModalColumnState_(){
    if (!editModalState) return;
    const label = editModalState.sectionLabel || '';
    const sectionKey = editModalState.sectionKey || '';
    const base = editModalState.baseAllow || {};
    const canToggle = editModalState.canToggle || {};
    const groupState = getGroupColumnStateBySectionKey_(sectionKey);
    const groupG = groupState.g !== false;
    const groupH = groupState.h !== false;
    const groupJ = groupState.j !== false;
    const lockG = document.getElementById('editLockG');
    const lockH = document.getElementById('editLockH');
    const lockJ = document.getElementById('editLockJ');
    const desiredG = lockG ? lockG.checked : base.g;
    const desiredH = lockH ? lockH.checked : base.h;
    const desiredJ = lockJ ? lockJ.checked : base.j;
    const allow1 = !!desiredG && !!canToggle.g && groupG && isSectionColumnEnabled_(label, 'g');
    const allow2 = !!desiredH && !!canToggle.h && groupH && isSectionColumnEnabled_(label, 'h');
    const allow3 = !!desiredJ && !!canToggle.j && groupJ && isSectionColumnEnabled_(label, 'j');
    editModalState.allow1 = allow1;
    editModalState.allow2 = allow2;
    editModalState.allow3 = allow3;
    const gEl = document.getElementById('editG');
    const jEl = document.getElementById('editJ');
    const hEl = document.getElementById('editH');
    if (gEl) gEl.disabled = !allow1;
    if (jEl) jEl.disabled = !allow3;
    if (hEl) hEl.disabled = !allow2;
  }

  function renderInventoryColumnsModal_(){
    const list = document.getElementById('inventoryColumnsList');
    const allList = document.getElementById('inventoryColumnsAll');
    if (!list || !allList) return;
    list.innerHTML = '';
    allList.innerHTML = '';
    const labelIndex = new Map();
    sectionsMeta.forEach(section => {
      const label = section.heading || section.label || '';
      const cfg = fieldCfgForSection_(label);
      const state = getSectionColumnState_(label);
      const row = document.createElement('div');
      row.className = 'inventoryColumnsRow';
      row.dataset.sectionLabel = label;
      const sectionCell = document.createElement('div');
      sectionCell.className = 'sectionLabel';
      sectionCell.textContent = label;
      row.appendChild(sectionCell);
      const columns = [
        { field: 'g', label: cfg.labels[1], force: cfg.forceDisable[1], checked: state.g },
        { field: 'h', label: cfg.labels[2], force: cfg.forceDisable[2], checked: state.h },
        { field: 'j', label: cfg.labels[3], force: cfg.forceDisable[3], checked: state.j }
      ];
      columns.forEach(col => {
        const wrap = document.createElement('label');
        wrap.className = 'colToggle';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!col.checked;
        cb.disabled = !!col.force;
        cb.dataset.sectionLabel = label;
        cb.dataset.field = col.field;
        cb.dataset.colLabelNorm = norm_(col.label || col.field);
        cb.addEventListener('change', syncInventoryAllToggles_);
        wrap.appendChild(cb);
        const text = document.createElement('span');
        text.textContent = col.label || col.field.toUpperCase();
        wrap.appendChild(text);
        row.appendChild(wrap);
        if (col.label) labelIndex.set(norm_(col.label), col.label);
      });
      list.appendChild(row);
    });
    const sortedLabels = Array.from(labelIndex.entries()).sort((a, b) => a[1].localeCompare(b[1]));
    sortedLabels.forEach(([labelNorm, labelText]) => {
      const row = document.createElement('div');
      row.className = 'inventoryAllRow';
      const wrap = document.createElement('label');
      wrap.className = 'colToggle';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.allLabelNorm = labelNorm;
      cb.addEventListener('change', () => {
        const targetChecked = cb.checked;
        document.querySelectorAll('#inventoryColumnsList input[data-col-label-norm]').forEach(box => {
          if (box.disabled) return;
          if (box.dataset.colLabelNorm !== labelNorm) return;
          box.checked = targetChecked;
        });
        syncInventoryAllToggles_();
      });
      wrap.appendChild(cb);
      const text = document.createElement('span');
      text.textContent = `ALL ${labelText}`;
      wrap.appendChild(text);
      row.appendChild(wrap);
      allList.appendChild(row);
    });
    syncInventoryAllToggles_();
  }
  function syncInventoryAllToggles_(){
    const allBoxes = Array.from(document.querySelectorAll('#inventoryColumnsList input[data-col-label-norm]'));
    document.querySelectorAll('#inventoryColumnsAll input[data-all-label-norm]').forEach(allCb => {
      const labelNorm = allCb.dataset.allLabelNorm || '';
      const matches = allBoxes.filter(cb => cb.dataset.colLabelNorm === labelNorm && !cb.disabled);
      if (!matches.length) {
        allCb.checked = false;
        allCb.indeterminate = false;
        allCb.disabled = true;
        return;
      }
      const checkedCount = matches.filter(cb => cb.checked).length;
      allCb.disabled = false;
      allCb.checked = checkedCount === matches.length;
      allCb.indeterminate = checkedCount > 0 && checkedCount < matches.length;
    });
  }
  function saveInventoryColumns_(){
    const next = {};
    document.querySelectorAll('#inventoryColumnsList input[data-field]').forEach(cb => {
      const label = cb.dataset.sectionLabel || '';
      const key = norm_(label);
      const field = cb.dataset.field;
      if (!field) return;
      if (!cb.checked) {
        if (!next[key]) next[key] = {};
        next[key][field] = false;
      }
    });
    uiSettings = uiSettings && typeof uiSettings === 'object' ? uiSettings : {};
    uiSettings.inventoryColumns = next;
    inventoryColumnSettings = next;
    showLoadingOverlay_("Saving Inventory Settings", "Updating inputs…", 0, 1, { mode: 'spinner' });
    google.script.run
      .withSuccessHandler(() => {
        hideLoadingOverlay_();
        applyInventoryColumnStateToDom_();
        closeInventoryColumnsModal();
      })
      .withFailureHandler(err => {
        hideLoadingOverlay_();
        setBanner("error", "Inventory settings error: " + (err && err.message ? err.message : err));
      })
      .saveUiSettings(uiSettings);
  }

  function downloadOrderGuideSelection_(){
    const sheets = getSelectedOrderGuideSheets_();
    if (!sheets.length){
      window.alert("Select at least one sheet.");
      return;
    }
    if (!ORDER_GUIDES_ID){
      window.alert("Order guides spreadsheet ID not found.");
      return;
    }
    const date = (document.getElementById('lastCompleted')?.value || "").trim() || formatToday_();
    const initials = (document.getElementById('initials')?.value || "").trim() || "NA";
    recordPendingMeta_(date, initials);
    const doDownload = () => {
      showGeneratingDocsOverlay_("Building selected order guides…");
      google.script.run
        .withSuccessHandler(res => {
          hideLoadingOverlay_();
          openPdfData_(res);
        })
        .withFailureHandler(err => {
          hideLoadingOverlay_();
          setBanner("error", "Order guide export error: " + (err && err.message ? err.message : err));
        })
        .getOrderGuidesPdf({ spreadsheetId: ORDER_GUIDES_ID, sheets, date, initials });
    };
    runWithPendingSync_(doDownload, { mode: 'spinner' });
  }

    const url = makePrintUrl_(ORDER_GUIDES_URL, header);

    runWithPendingSync_(() => openPrintUrl_(url, name), { mode: 'spinner' });

    if (orderGuideBlankBox) orderGuideBlankBox.checked = false;
    if (inventoryBox) inventoryBox.checked = false;
    if (inventoryBlankBox) inventoryBlankBox.checked = false;
    const subjectEl = document.getElementById('emailSubject');
    const bodyEl = document.getElementById('emailBody');
    if (mode === 'order') {
      if (subjectEl) subjectEl.value = 'Order Submission — Order Guide';
      if (bodyEl) bodyEl.value = 'Attached order guide for order submission.';
    } else if (mode === 'question') {
      if (subjectEl) subjectEl.value = 'Order Guide — Question';

    }
  }

  function formatToday_(){
    const d = new Date();

    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  function makePrintUrl_(url, headerText){
    try{
      const u = new URL(url);
      if (u.pathname.includes('/edit')) {
        u.pathname = u.pathname.replace(/\/edit.*$/, '/export');
      } else if (!u.pathname.endsWith('/export')) {
        u.pathname = u.pathname.replace(/\/$/, '') + '/export';
      }
      const params = u.searchParams;
      params.delete('gid');               // remove single-sheet focus so whole workbook prints
      params.set('format','pdf');
      params.set('portrait','true');       // portrait
      params.set('size','letter');
      params.set('gridlines','true');
      params.set('sheetnames','true');
      params.set('printtitle','false');    // hide document title
      params.set('pagenum','RIGHT');
      params.set('attachment','false');     // open in browser
      params.set('fzr','false');            // repeat frozen rows
      if (headerText) {
        params.set('filename', headerText);
      }
      return u.toString();
    }catch(e){
      return url;
    }
  }

  function saveNewSection_(){
    const type = document.querySelector('input[name="newSectionType"]:checked')?.value || 'home';
    const multi = !!document.getElementById('addSectionMulti')?.checked;
    let sections = [];
    if (multi) {
      const selectedEntries = getAddSectionSelectedEntries_();
      if (!selectedEntries.length){
        window.alert('Select at least one row to create sections.');
        return;
      }
      sections = selectedEntries.map(entry => {
        const firstCol = Array.isArray(entry?.cols) ? entry.cols[0] : '';
        const label = String(entry.label || entry.key || firstCol || '').trim();
        const ids = Array.isArray(entry.itemIds) ? entry.itemIds : [];
        const deduped = Array.from(new Set(ids.map(id => String(id || '').trim()).filter(Boolean)));
        return { label, itemIds: deduped };
      }).filter(entry => entry.label);
      if (!sections.length){
        window.alert('Selected rows are missing labels.');
        return;
      }
    } else {
      const label = (document.getElementById('newSectionName')?.value || '').trim();
      if (!label){
        window.alert('Enter a section name.');
        return;
      }
      sections = [{ label, itemIds: Array.from(addSectionSelection || []) }];
    }
    const selectedItemIds = getAddSectionSelectedItemIds_(sections);
    const duplicateCount = countAddSectionDuplicateItemIds_(sections);
    if (type === 'home' && selectedItemIds.length){
      const preview = getAddSectionRehomePreview_(selectedItemIds);
      const needsConfirm = preview.sourceSections > 1 || preview.toSecondary > 0 || duplicateCount > 0;
      if (needsConfirm){
        const parts = [
          `Rehome ${preview.totalItems} item(s) from ${preview.sourceSections} home section(s).`
        ];
        if (preview.toSecondary) parts.push(`${preview.toSecondary} section(s) will become SECONDARY.`);
        if (duplicateCount) parts.push(`${duplicateCount} item(s) appear in multiple selections (last section wins).`);
        parts.push('Continue?');
        if (!window.confirm(parts.join(' '))) return;
      }
    }
    const payload = {
      type,
      labels: {
        g: (document.getElementById('newSectionLabelG')?.value || '').trim(),
        h: (document.getElementById('newSectionLabelH')?.value || '').trim(),
        j: (document.getElementById('newSectionLabelJ')?.value || '').trim()
      },
      columns: {
        g: !!document.getElementById('newSectionEnableG')?.checked,
        h: !!document.getElementById('newSectionEnableH')?.checked,
        j: !!document.getElementById('newSectionEnableJ')?.checked
      },
      sections
    };
    closeAddSectionModal();
    setSavePill("saving", "Saving…");
    setBanner(null, null);
    google.script.run
      .withSuccessHandler(res => {
        if (!res?.ok){
          setSavePill("err", "Error");
          setBanner("warn", res?.message || "Section add failed.");
          return;
        }
        setSavePill("ok", "Saved");
        applyAddSectionLocal_(payload);
      })
      .withFailureHandler(err => {
        setSavePill("err", "Error");
        setBanner("error", "Add section error: " + (err && err.message ? err.message : err));
      })
      .addSection(payload);
  }

    const s = Math.max(0, Math.min(start, end));
    const e = Math.min(rows.length - 1, Math.max(start, end));
    for (let i = s; i <= e; i += 1) {
      const cat = String(categories[i] || '');

  function handleCategoryItemClick_(e, row){

      categoryDragMoved = false;

    const listId = row?.dataset?.listId || '';
    const idx = Number(row?.dataset?.index);
    if (!listId || !Number.isFinite(idx)) return;
    const lastIndex = categoryLastIndexByList[listId];
    if (e.shiftKey && lastIndex !== null && lastIndex !== undefined) {
      selectCategoryRange_(listId, lastIndex, idx, true);
    } else {
      toggleCategorySelection_(listId, idx, row);

  function handleCategoryItemPointerDown_(e, row){
    if (e.shiftKey) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (e.pointerType === 'mouse') e.preventDefault();
    const listId = row?.dataset?.listId || '';
    const idx = Number(row?.dataset?.index);
    if (!listId || !Number.isFinite(idx)) return;
    const ctx = getCategoryListContext_(listId);
    if (!ctx || !ctx.table) return;
    const cat = String(categories[idx] || '');
    const selected = isCategorySelected_(ctx.table, cat);
    categoryDragActive = true;
    categoryDragAction = selected ? 'deselect' : 'select';
    categoryDragListId = listId;
    categoryDragLastIndex = idx;
    categoryDragMoved = true;
    setCategorySelected_(ctx.table, cat, categoryDragAction === 'select');
    setCategoryRowSelected_(row, categoryDragAction === 'select');
    ctx.onChange && ctx.onChange();
    categoryLastIndexByList[listId] = idx;

    const listId = row.dataset.listId || '';
    if (!listId || listId !== categoryDragListId) return;
    const idx = Number(row.dataset.index);

    const ctx = getCategoryListContext_(listId);
    if (!ctx || !ctx.table) return;
    const cat = String(categories[idx] || '');
    categoryDragMoved = true;
    categoryDragLastIndex = idx;

      .deleteDistributor({ key: manageDistKey });
  }
  function clearAddForm(){
    document.getElementById("newCommon").value = "";
    document.getElementById("newOrder").value = "";
    document.getElementById("newSize").value = "";
    document.getElementById("newPar").value = "";
    document.getElementById("newCost").value = "";
    document.getElementById("newCsSize").value = "";
    document.getElementById("newNotes").value = "";
  }
  function addItem(){
    const payload = {
      section: document.getElementById("newSection").value,
      categoryN: document.getElementById("newCategory").value,
      vendor: document.getElementById("newVendor").value,
      commonName: document.getElementById("newCommon").value,
      orderName: document.getElementById("newOrder").value,
      bottleSize: document.getElementById("newSize").value,
      par: document.getElementById("newPar").value,
      cost: document.getElementById("newCost").value,
      csSize: document.getElementById("newCsSize").value,
      notes: document.getElementById("newNotes").value
    };
    // Client-side validation
    const addErrors = [];
    if (!String(payload.commonName || '').trim()) addErrors.push('Common name is required.');
    if (!String(payload.section || '').trim()) addErrors.push('Section is required.');
    if (payload.par && !/^\d+(\.\d+)?$/.test(String(payload.par).trim())) addErrors.push('Par must be a number.');
    if (payload.cost && !/^\$?\d+(\.\d{1,2})?$/.test(String(payload.cost).trim())) addErrors.push('Cost must be a valid dollar amount.');
    if (payload.csSize && !/^\d+(\.\d+)?$/.test(String(payload.csSize).trim())) addErrors.push('Case size must be a number.');
    if (addErrors.length) {
      setBanner('error', addErrors.join(' '));
      return;
    }
    closeAddModal();
    setStatus("Adding item…");
    setSavePill("saving","Working…");
    setBanner(null, null);
    google.script.run
      .withSuccessHandler(res => {
        if (!res?.ok){
          setSavePill("err","Error");
          setBanner("warn", res?.message || "Add failed.");
          setStatus("");
          return;
        }
        const ord = res.ordering;
        if (ord && ord.ok) {
          setStatus(`Added item. New ID: ${res.id}. Ordering insert: ${ord.sheet} / ${ord.tableName} (Row ${ord.insertedRow}).`);
        } else if (ord && ord.skipped) {
          setBanner("warn", `Item added to INVENT (ID ${res.id}), ordering insertion skipped.\nReason: ${ord.message || 'Unknown'}`);
          setStatus(`Added item. New ID: ${res.id}.`);
        } else if (ord && ord.ok === false) {
          setBanner("warn", `Item added to INVENT (ID ${res.id}), ordering insertion failed.\nReason: ${ord.message || 'Unknown'}`);
          setStatus(`Added item. New ID: ${res.id}.`);
        } else {
          setStatus(`Added item. New ID: ${res.id}.`);
        }
        setSavePill("ok","Added");
        clearAddForm();
        const item = res.item || {
          type: 'item',
          section: String(payload.section || '').trim(),
          id: String(res.id || ''),
          b: String(payload.commonName || '').trim().toUpperCase(),
          orderName: String(payload.orderName || '').trim().toUpperCase(),
          bottleSize: String(payload.bottleSize || '').trim(),
          par: String(payload.par || '').trim(),
          categoryN: String(payload.categoryN || '').trim(),
          vendor: String(payload.vendor || '').trim(),
          cost: String(payload.cost || '').trim(),
          csSize: String(payload.csSize || '').trim(),
          notes: String(payload.notes || '').trim(),
          o: String(payload.vendor || '').trim(),
          g: '',
          h: '',
          j: '',
          editable: { g: true, h: true, j: true }
        };
        insertItemIntoAllRows_(item);
        buildRightNav_();
        applyFilter();
      })
      .withFailureHandler(err => {
        setSavePill("err","Error");
        setBanner("error", "Add error: " + (err && err.message ? err.message : err));
        setStatus("");
      })
      .addInventItem(payload);
  }
  function buildSectionLabelSet_(){
    const set = new Set();
    (sectionsMeta || []).forEach(s => {
      const label = String(s?.heading || s?.label || '').trim();
      if (label) set.add(norm_(label));
    });
    return set;
  }
  function getItemIdsForSectionKey_(sectionKey){
    const target = String(sectionKey || '').trim();
    if (!target) return [];
    const ids = [];
    let inSection = false;
    (allRows || []).forEach(r => {
      if (!r) return;
      if (r.type === 'header') {
        inSection = String(r.key || '').trim() === target;
        return;
      }
      if (inSection && r.type === 'item') {
        const id = String(r.id || '').trim();
        if (id) ids.push(id);
      }
    });
    return Array.from(new Set(ids));
  }
  function buildCopySectionLabel_(label, groupName, usedLabels){
    const baseName = String(label || '').trim();
    if (!baseName) return '';
    const suffix = groupName ? ` (${groupName})` : ' (COPY)';
    const base = `${baseName}${suffix}`;
    let candidate = base;
    let idx = 2;
    while (usedLabels && usedLabels.has(norm_(candidate))) {
      candidate = `${base} ${idx}`;
      idx += 1;
    }
    if (usedLabels) usedLabels.add(norm_(candidate));
    return candidate;
  }
  loadPendingEdits_();
  loadPendingMeta_();
  updatePendingPill_();
  updateRightTabStates_();
  document.addEventListener('keydown', handleGlobalKeyNav_);
  document.addEventListener('pointermove', handleAddSectionPointerMove_);
  document.addEventListener('pointermove', handleAddGroupPointerMove_);
  document.addEventListener('pointermove', handleCategoryPointerMove_);
  document.addEventListener('pointerup', endAddSectionDrag_);
  document.addEventListener('pointerup', endAddGroupDrag_);
  document.addEventListener('pointerup', endCategoryDrag_);
  document.addEventListener('pointercancel', endAddSectionDrag_);
  document.addEventListener('pointercancel', endAddGroupDrag_);
  document.addEventListener('pointercancel', endCategoryDrag_);
  const importInput = document.getElementById('settingsImportFile');
  if (importInput && importInput.dataset.bound !== "1") {
    importInput.dataset.bound = "1";
    importInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      handleImportWebappFile_(file);
    });
  }
  cacheDefaultUi_();
  wireKeyboardAwareSearch_();
  showPage_(currentPage);
  refresh({ mode: 'percent' });
</script>
