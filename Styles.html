  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --card2:#0f1930;
      --muted:#98a2b3;
      --text:#e6e9f0;
      --border:rgba(255,255,255,0.10);
      --border2:rgba(255,255,255,0.14);
      --warnbg:#2a1f06;
      --warnbd:#8a6a18;
      --errbg:#2a0b0b;
      --errbd:#8a2a2a;
      --bottomBarH: 66px;
      --navBaseW: 46px;
      --navBaseH: 46px;
      --navHeightScale: 1;
      --navSlotGap: 6px;
      --navBtnH: calc(var(--navBaseH) * var(--navHeightScale));
      --navSlotH: calc(var(--navBtnH) + var(--navSlotGap));
      --navScale: 1;
      --upDownH: var(--navBtnH);
      --rightNavW: var(--navBaseW);
      --leftNavW: var(--navBaseW);
      --navOffsetY: 44px;
      --leftNavAddRaiseY: 184px;
      --tabRed: rgba(255,90,90,0.85);
      --tabGreen: rgba(80,220,130,0.85);
      --tabYellow: rgba(255,220,90,0.90);
      --flashBlueA: rgba(140,200,255,0.75);
      --flashBlueB: rgba(140,200,255,0.18);
      --flashRedA: rgba(255,90,90,0.85);
      --flashRedB: rgba(255,90,90,0.18);
      --flashGreenA: rgba(90,200,140,0.85);
      --flashGreenB: rgba(90,200,140,0.18);
      --addYellowA: rgba(255,220,90,0.90);
      --addYellowB: rgba(255,220,90,0.22);
      --iconStroke: #ffffff;
    }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }
    header{
      background:linear-gradient(to bottom, rgba(11,18,32,0.98), rgba(11,18,32,0.90));
      border-bottom:1px solid var(--border);
      padding:10px 12px 10px;
      position: relative;
      z-index: 10;
    }
    .wrap{
      padding:12px;
      padding-bottom: calc(var(--bottomBarH) + 18px);
      padding-right: calc(var(--rightNavW) + 12px);
      padding-left: calc(var(--leftNavW) + 12px);
    }
    h1{
      font-size:16px; margin:0;
      letter-spacing:0.2px;
      display:grid;
      grid-template-columns: minmax(0,1fr) auto minmax(0,1fr);
      align-items:center;
      gap:10px;
    }
    .headerTitle{ justify-self:start; }
    .headerActions{
      justify-self:center;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .orderGuidesBtn{ justify-self:center; }
    #savePill{ justify-self:end; }
    .topRow{
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
      margin-top:8px;
    }
    .leftControls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .rightControls{
      display:flex;
      gap:8px;
      align-items:flex-end;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .headerRow{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:6px;
    }
    .headerActionBtns{
      display:flex;
      gap:8px;
      align-items:flex-end;
    }
    .pageTabs{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:0;
      flex: 1 1 360px;
    }
    .pageTabBtn{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      cursor:pointer;
    }
    .pageTabBtn.active{
      border-color: var(--addYellowA);
      background: rgba(255,220,90,0.18);
      color: #fff;
    }
    .pagePanel{ display:none; }
    .pagePanel.active{ display:block; }
    .orderingWrap{
      padding:12px;
    }
    .orderingFrame{
      width:100%;
      height: calc(100vh - 260px);
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
    }
    .orderingFrameWrap{
      position:relative;
    }
    .orderingFrameLoader{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--card);
      border-radius:12px;
      color:var(--muted);
      font-size:14px;
      font-weight:600;
      letter-spacing:0.2px;
      pointer-events:none;
      transition:opacity 0.3s;
      z-index:1;
    }
    .orderingFrameLoader.hidden{
      opacity:0;
      pointer-events:none;
    }
    .settingsPageCard{
      padding:16px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .iconBtn{
      font-size: 36px;
      padding: 6px 10px;
      text-transform: none;
      line-height: 1;
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
      color: var(--iconStroke);
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .iconBtn.emailIcon{ font-size: 36px; }
    .iconSvg{
      width: 32px;
      height: 32px;
      display:block;
    }
    .headerFieldGroup{
      display:flex;
      gap:8px;
      align-items:flex-end;
      border:2px solid var(--addYellowA);
      border-radius:14px;
      padding:8px;
    }
    .sub{ font-size:12px; color:var(--muted); margin:6px 0 0; line-height:1.35; }
    input[type="text"], input[type="email"], input[type="date"], select, textarea{
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      outline:none;
      width:100%;
      box-sizing:border-box;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus{
      outline: 2px solid rgba(95,168,255,0.95);
      outline-offset: 2px;
    }
    button{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      cursor:pointer;
      font-weight:800;
      text-transform:uppercase;
      white-space:nowrap;
    }
    button:active{ transform: translateY(1px); }
    button.primary{ border-color: rgba(140,200,255,0.55); background: rgba(140,200,255,0.14); }
    button.danger{ border-color: rgba(255,140,140,0.65); background: rgba(255,140,140,0.18); }
    button.danger:active{ border-color: rgba(255,120,120,0.85); background: rgba(255,120,120,0.32); }
    button.success{ border-color: rgba(90,200,140,0.65); background: rgba(90,200,140,0.18); }
    button.success:active{ border-color: rgba(70,185,125,0.85); background: rgba(70,185,125,0.32); }
    .settingsIconBtn{
      font-size: 36px;
      line-height: 1;
      padding: 6px 10px;
      text-transform: none;
      border-color: rgba(95,168,255,0.95);
      background: rgba(95,168,255,0.14);
    }
    .companyName{
      display:block;
      font-size: 2em;
      line-height: 1;
    }
    .portalName{
      display:block;
      margin-top: 2px;
    }
    .pill{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      font-size:12px;
      color:var(--muted);
    }
    .pill.ok{ border-color:rgba(255,255,255,0.24); color:rgba(230,240,255,0.95); }
    .pill.err{ border-color:rgba(255,120,120,0.55); color:rgba(255,205,205,0.95); }
    .pill.pending{ border-color: var(--addYellowA); color: rgba(255,235,160,0.95); }
    .banner{ margin:10px 0 12px; padding:10px; border-radius:12px; white-space:pre-wrap; font-size:13px; }
    .banner.warn{ background:var(--warnbg); border:1px solid var(--warnbd); }
    .banner.err{ background:var(--errbg); border:1px solid var(--errbd); }
    .sectionSpacer{ height:14px; }
    .lineRow{
      margin:6px 0;
      padding:6px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.18);
      background: var(--line-bg, rgba(255,255,255,0.08));
      color: var(--line-text, rgba(230,240,255,0.95));
      font-size: var(--line-font, 12px);
      min-height: var(--line-height, 24px);
      display:flex;
      align-items:center;
      justify-content: var(--line-justify, flex-start);
      text-align: var(--line-align, left);
      font-weight: var(--line-weight, 700);
      font-style: var(--line-style, normal);
      text-decoration: var(--line-decor, none);
      letter-spacing:0.2px;
    }
    .lineRow span{ width:100%; }
    .lineEditorList{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:260px;
      overflow:auto;
      padding-right:4px;
    }
    .lineEditorRow{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }
    .lineEditorRow .cell{ margin:0; }
    .lineToggleRow{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
    }
    .lineToggleRow label{
      display:inline-flex;
      align-items:center;
      gap:4px;
      font-size:12px;
      font-weight:800;
    }
    .numBadge{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:18px; height:18px; padding:0 6px;
      border-radius:999px; border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.08);
      font-size:11px; font-weight:900; color:rgba(230,240,255,0.96);
      line-height:1; letter-spacing:0.2px; flex:0 0 auto;
    }
    .group{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,0.07);
      border:1px solid var(--border2);
      font-weight:900;
      letter-spacing:0.6px;
      text-transform:uppercase;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
      scroll-margin-top: 20px;
    }
    .group[data-section-key]{
      padding-left: 52px;
    }
    .group[data-section-key][data-section-color="1"]{
      border-color: var(--section-color, var(--border2));
      background: var(--section-bg, rgba(255,255,255,0.06));
      color: var(--section-header-text, rgba(230,240,255,0.96));
    }
    .groupBody .group[data-section-key]{
      border-color: var(--section-color, var(--border2));
      background: var(--section-bg, rgba(255,255,255,0.07));
      color: var(--section-header-text, rgba(230,240,255,0.96));
    }
    .group:hover{ border-color: rgba(255,255,255,0.22); }
    .groupLeft{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1 1 auto; min-width:0; }
    .groupTitle{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1 1 auto; min-width:0; }
    .groupSub{
      font-size:11px;
      font-weight:800;
      letter-spacing:0.2px;
      color: rgba(230,240,255,0.70);
      text-transform:none;
      flex:1 1 100%;
      width:100%;
    }
    .groupSub.sectionSubGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(40px, 0.6fr));
      gap:8px;
      align-items:center;
      justify-items:end;
      text-align:right;
      min-width:180px;
      flex:0 0 auto;
    }
    .groupSub.sectionSubGrid .fieldCellHidden{ display:none; }
    .groupRight{
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
      flex:1 1 auto;
      min-width:0;
    }
    .sectionEditBtn{
      width:32px; height:32px;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:8px;
      border:1px solid var(--card);
      background: var(--card);
      color:var(--text);
      font-size:14px;
      font-weight:900;
      padding:0;
      text-transform:none;
    }
    .sectionEditBtn .editIcon,
    .itemEditBtn .editIcon{
      width:18px;
      height:18px;
      display:block;
    }
    .sectionEditBtn:hover{ border-color: rgba(255,255,255,0.26); }
    .sectionEditBtn:active{ border-color:#5fa8ff; background:rgba(95,168,255,0.22); color:#0b1220; }
    .groupEditBtn{ margin-left:0; }
    .groupEditBtn:active{ border-color:#5fa8ff; background:rgba(95,168,255,0.22); color:#0b1220; }
    .chev{
      width:18px; height:18px;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(255,255,255,0.06);
      flex:0 0 auto;
      transition: transform 140ms ease;
    }
    .collapsed .chev{ transform: rotate(-90deg); }
    .group[data-heading-align="center"] .groupTitle,
    .groupHeading[data-heading-align="center"] .groupTitle{
      justify-content:center;
      text-align:center;
    }
    .group[data-heading-align="center"] .groupSub,
    .groupHeading[data-heading-align="center"] .groupSub{
      text-align:center;
    }
    .group[data-heading-align="right"] .groupTitle,
    .groupHeading[data-heading-align="right"] .groupTitle{
      justify-content:flex-end;
      text-align:right;
    }
    .group[data-heading-align="right"] .groupSub,
    .groupHeading[data-heading-align="right"] .groupSub{
      text-align:right;
    }
    .sectionBody.hidden{ display:none; }
.itemRow{
  display:grid;
  grid-template-columns: minmax(170px, 2.6fr) minmax(40px, 0.6fr) minmax(40px, 0.6fr) minmax(40px, 0.6fr);
  gap:8px;
  align-items:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:8px 8px 8px 44px;
  margin-bottom:6px;
  scroll-margin-top: 24px;
  position:relative;
}
.itemRow .cell.fieldCellHidden{ display:none; }
.itemRow.zebra{ background:#16253f; }
.itemRow.rowFocus{
  border-color: rgba(255,255,255,0.95);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.18);
}
.itemName{
  font-weight:850; line-height:1.15; font-size:14px;
  text-align:right; justify-self:end;
      overflow:hidden; text-overflow:ellipsis;
      white-space:nowrap;
  transform: scale(1);
  transform-origin: right center;
  transition: transform 100ms ease, color 100ms ease;
  will-change: transform;
  position: relative;
  z-index: 2;
    }
.itemRow.rowFocus .itemName{
  transform: scale(2.5);
  color: var(--addYellowA);
}
    .cell{ display:flex; flex-direction:column; gap:6px; min-width:0; }
    .label{
      font-size:11px; color:var(--muted);
      font-weight:750; letter-spacing:0.2px; line-height:1;
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
      justify-content:flex-end;
      text-align:right;
    }
.cell input, .cell select{
  width:100%;
  padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      font-size:16px;
      box-sizing:border-box;
    }
    .cell input:disabled, .cell select:disabled{ opacity:0.55; background:rgba(255,255,255,0.03); }
.itemRow input[data-field]:focus,
.itemRow select[data-field]:focus{
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.9);
  outline: 2px solid rgba(255,255,255,0.9);
  outline-offset: 2px;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
}
    .flashBlue{
      outline: 2px solid var(--flashBlueA);
      box-shadow: 0 0 0 4px var(--flashBlueB);
      animation: flashFadeBlue 1.2s ease-out forwards;
    }
    @keyframes flashFadeBlue {
      0% { background: rgba(140,200,255,0.10); }
      100% { background: transparent; }
    }
    .flashRed{
      outline: 2px solid var(--flashRedA);
      box-shadow: 0 0 0 4px var(--flashRedB);
      animation: flashFadeRed 1.2s ease-out forwards;
    }
    @keyframes flashFadeRed {
      0% { background: rgba(255,90,90,0.10); }
      100% { background: transparent; }
    }
    .flashGreen{
      outline: 2px solid var(--flashGreenA);
      box-shadow: 0 0 0 4px var(--flashGreenB);
      animation: flashFadeGreen 1.2s ease-out forwards;
    }
    @keyframes flashFadeGreen {
      0% { background: rgba(90,200,140,0.10); }
      100% { background: transparent; }
    }
    @media (max-width: 520px){
      .itemRow{
        grid-template-columns: minmax(140px, 2.8fr) minmax(36px, 0.6fr) minmax(36px, 0.6fr) minmax(36px, 0.6fr);
        gap:8px;
      }
      .itemName{
        text-align:right; justify-self:end;
        white-space:normal;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
      }
      .cell input, .cell select{ padding:9px 8px; font-size:15px; }
    }
    .status{ margin:12px 0 24px; color:var(--muted); font-size:13px; white-space:pre-wrap; }
    .rightNav{
      position:fixed;
      top: calc(112px + var(--navOffsetY));
      right: 8px;
      z-index: 20;
      width: var(--rightNavW);
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:stretch;
      pointer-events:auto;
    }
.leftNav{
  position:fixed;
  top: calc(112px + var(--navOffsetY));
  left: 8px;
  z-index: 20;
  width: var(--leftNavW);
  display:grid;
  grid-template-rows: repeat(16, var(--navSlotH));
  grid-auto-rows: var(--navSlotH);
  gap:0;
  align-items:stretch;
  align-content:start;
  pointer-events:auto;
  min-height: calc(100vh - 140px);
}
.flexSpacer{ flex:1 1 auto; }
    .tabBtn{
      width: var(--rightNavW);
      height: var(--navBtnH);
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: var(--tabTextColor, rgba(230,240,255,0.92));
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.2px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      user-select:none;
      align-self:center;
      justify-self:stretch;
    }
    .tabBtn.hasColor{ --tabTextColor: var(--tabColor); }
    .tabBtn:hover{ border-color: rgba(255,255,255,0.30); }
    .tabBtn.topBtn{ border-color: rgba(95,168,255,0.85); }
    .tabBtn.stateCollapsed{ border-color: var(--tabRed); --tabTextColor: var(--tabRed); }
    .tabBtn.stateExpanded{ border-color: var(--tabGreen); }
    .tabBtn.stateMixed{ border-color: var(--tabYellow); }
    .tabBtn.topBtn:active{ border-color:#5fa8ff; background:rgba(95,168,255,0.22); color:#0b1220; }
.leftBtn{
  width: var(--leftNavW);
  height: var(--navBtnH);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: rgba(230,240,255,0.92);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 0.1px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 6px;
  user-select:none;
  align-self:center;
  justify-self:stretch;
}
.leftBtn:hover{ border-color: rgba(255,255,255,0.30); }
.leftBtn.tallBtn{ height: 120px; }
.leftBtn.upDownBtn{ height: var(--upDownH); }
.leftBtn.navGap{ margin-top: 0; }
.leftBtn.navGap8{ margin-top: 0; }
.leftBtn.undoBtn{
  color:#ff6b6b;
  border-color: rgba(255,107,107,0.85);
}
.leftBtn.undoBtn:active{ border-color:#5fa8ff; background:rgba(95,168,255,0.25); }
.leftBtn.redoBtn{ border-color: rgba(90,200,140,0.85); }
.leftBtn.redoBtn:active{ border-color:#46b97d; background:rgba(90,200,140,0.22); }
.leftBtn.tabBtnClass,
.leftBtn.backBtnClass,
.leftBtn.navBtnClass{ border-color:#ffffff; color:#ffffff; font-size:16px; }
.leftBtn.tabBtnClass:active,
.leftBtn.backBtnClass:active,
.leftBtn.navBtnClass:active{ border-color:#22c55e; background:rgba(34,197,94,0.22); color:#0b1220; }
.leftBtn.addBtn{
  color: var(--addYellowA);
  margin-top: 0;
  border-color: var(--addYellowA);
  font-size: 24px;
}
.leftBtn.settingsBtn{
  margin-top: 0;
  border-color: rgba(95,168,255,0.95);
  background: rgba(95,168,255,0.14);
  font-size: 36px;
  line-height: 1;
  font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
}
.leftBtn.saveBtn{
  margin-top: 0;
  border-color: rgba(90,200,140,0.85);
  font-size: 24px;
  line-height: 1;
  font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
  color: var(--iconStroke);
  display:inline-flex;
  align-items:center;
